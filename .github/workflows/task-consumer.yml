name: CI/CD Pipeline - Task Consumer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger for CD

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: europe-west1
  GAR_REPOSITORY: services-repo
  IMAGE_NAME: task-consumer
  NAMESPACE: services
  DEPLOYMENT_NAME: task-consumer
  NODE_VERSION: '18'

jobs:
  # ============================================
  # CI STAGES
  # ============================================

  # 1. BUILD APPLICATION
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Build application
        working-directory: .
        run: npm run build || echo "No build script found"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./dist/
          retention-days: 1

  # 2. UNIT TESTS
  unit-tests:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Run unit tests
        working-directory: .
        run: npm test || echo "No tests found"
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7

  # 3. CODE VALIDATION (Lint & Format)
  code-validation:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Run ESLint
        working-directory: .
        run: npm run lint || echo "No lint script found"
        continue-on-error: false

      - name: Check formatting
        working-directory: .
        run: npx prettier --check "src/**/*.js" || echo "No prettier config found"

  # 4. INTEGRATION TESTS (with RabbitMQ & PostgreSQL)
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, code-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start test containers
        run: |
          docker network create test-network
          docker run -d --name rabbitmq-test --network test-network -p 5672:5672 rabbitmq:3.13-management
          docker run -d --name postgres-test --network test-network -p 5432:5432 \
            -e POSTGRES_DB=testdb \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_PASSWORD=testpass \
            postgres:15
          sleep 15

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Run integration tests
        working-directory: .
        run: npm run test:integration || echo "No integration tests found"
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb

      - name: Cleanup test containers
        if: always()
        run: |
          docker stop rabbitmq-test postgres-test
          docker rm rabbitmq-test postgres-test
          docker network rm test-network

  # ============================================
  # CD STAGES (Only on main branch push)
  # ============================================

  # 5. BUILD AND PUSH DOCKER IMAGE
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [unit-tests, code-validation, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 416.0.0'
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev --quiet

      - name: Set image tags
        run: |
          # Version with commit SHA (unique)
          echo "IMAGE_URI_SHA=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:${GITHUB_SHA}" >> $GITHUB_ENV
          # Latest version (for demo)
          echo "IMAGE_URI_LATEST=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:latest" >> $GITHUB_ENV
          # Dev version (for development)
          echo "IMAGE_URI_DEV=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:dev" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_URI_SHA }}
            ${{ env.IMAGE_URI_LATEST }}
            ${{ env.IMAGE_URI_DEV }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=$(date -Iseconds)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log image info
        run: |
          echo "✅ Image built and pushed:"
          echo "  - SHA version: $IMAGE_URI_SHA"
          echo "  - Latest version: $IMAGE_URI_LATEST"
          echo "  - Dev version: $IMAGE_URI_DEV"

  deploy-to-gke:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 416.0.0'
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Create namespace if not exists
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/Update secrets
        run: |
          kubectl create secret generic rabbitmq-secret -n $NAMESPACE \
            --from-literal=RABBITMQ_URL="${{ secrets.RABBITMQ_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl create secret generic postgres-secret -n $NAMESPACE \
            --from-literal=POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}" \
            --from-literal=POSTGRES_PORT="${{ secrets.POSTGRES_PORT }}" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Delete old deployment (to ensure clean state)
        run: |
          # Delete existing deployment if any
          kubectl delete deployment $DEPLOYMENT_NAME -n $NAMESPACE --ignore-not-found=true
          
          # Force delete any remaining pods
          kubectl delete pods -l app=$DEPLOYMENT_NAME -n $NAMESPACE --force --grace-period=0 --ignore-not-found=true
          
          # Wait for cleanup
          sleep 5

      - name: Deploy new version
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: $DEPLOYMENT_NAME
            namespace: $NAMESPACE
            annotations:
              deployed-at: "$(date -Iseconds)"
              git-commit: "${{ github.sha }}"
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: $DEPLOYMENT_NAME
            template:
              metadata:
                labels:
                  app: $DEPLOYMENT_NAME
                  version: "${{ github.sha }}"
              spec:
                terminationGracePeriodSeconds: 10
                containers:
                - name: $DEPLOYMENT_NAME
                  image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
                  envFrom:
                  - secretRef:
                      name: rabbitmq-secret
                  - secretRef:
                      name: postgres-secret
                  ports:
                  - containerPort: 3002
                    name: http
                  resources:
                    requests:
                      memory: "2Gi"
                      cpu: "500m"
                    limits:
                      memory: "4Gi"
                      cpu: "1000m"
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 3002
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: 3002
                    initialDelaySeconds: 10
                    periodSeconds: 5
          EOF

      - name: Wait for pod to be ready
        run: |
          echo "⏳ Waiting for pod to be ready..."
          
          # Wait for pod to exist
          for i in {1..30}; do
            POD_NAME=$(kubectl get pods -n $NAMESPACE -l app=$DEPLOYMENT_NAME -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "$POD_NAME" ]; then
              echo "📦 Pod found: $POD_NAME"
              break
            fi
            sleep 2
          done
          
          # Wait for pod to be ready
          kubectl wait --for=condition=ready pod -l app=$DEPLOYMENT_NAME -n $NAMESPACE --timeout=180s || true
          
          # Show pod status
          kubectl get pods -n $NAMESPACE -l app=$DEPLOYMENT_NAME
          
          # Show logs
          POD_NAME=$(kubectl get pods -n $NAMESPACE -l app=$DEPLOYMENT_NAME -o jsonpath='{.items[0].metadata.name}')
          if [ -n "$POD_NAME" ]; then
            echo "📋 Recent logs:"
            kubectl logs $POD_NAME -n $NAMESPACE --tail=30
          fi

      - name: Verify deployment
        run: |
          READY=$(kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE -o jsonpath='{.status.readyReplicas}')
          if [ "$READY" == "1" ]; then
            echo "✅ Deployment $DEPLOYMENT_NAME is ready with 1 replica"
          else
            echo "❌ Deployment failed. Current status:"
            kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE
            kubectl get pods -n $NAMESPACE -l app=$DEPLOYMENT_NAME
            exit 1
          fi

  # 7. VERIFY DEPLOYMENT
  verify-deployment:
    runs-on: ubuntu-latest
    needs: deploy-to-gke
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Check deployment status
        run: |
          echo "=========================================="
          echo "✅ CI/CD PIPELINE COMPLETED"
          echo "=========================================="
          echo "📦 Image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🔧 Commit: ${{ github.sha }}"
          echo "📁 Namespace: ${{ env.NAMESPACE }}"
          echo "🚀 Deployment: ${{ env.DEPLOYMENT_NAME }}"
          echo "=========================================="
          echo ""
          echo "📋 Pipeline logs available at:"
          echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Show deployment info
        run: |
          echo "To check deployment status, run:"
          echo "  kubectl get pods -n $NAMESPACE | grep $DEPLOYMENT_NAME"
          echo "  kubectl logs -l app=$DEPLOYMENT_NAME -n $NAMESPACE --tail=20"