apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-processing
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-processing
  template:
    metadata:
      labels:
        app: task-processing
    spec:
      containers:
      - name: task-processing
        image:
          kubectl set image deployment/$DEPLOYMENT_NAME $DEPLOYMENT_NAME=$IMAGE_URI -n $NAMESPACE || \
          kubectl apply -f task-consumer-deployment.yaml -n $NAMESPACE
        env:
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq.infra.svc.cluster.local:5672"
        - name: POSTGRES_HOST
          value: "postgresql.infra.svc.cluster.local"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: "appuser"
        - name: POSTGRES_PASSWORD
          value: "dbpassword"
        - name: POSTGRES_DB
          value: "appdb"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"